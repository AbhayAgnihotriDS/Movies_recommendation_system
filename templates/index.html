<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Movie Recommender</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Segoe UI', sans-serif;
}

body {
    background: linear-gradient(135deg, #0f172a, #1e293b);
    color: white;
    min-height: 100vh;
}

/* Header */
header {
    background: linear-gradient(90deg, #ef4444, #dc2626);
    padding: 20px;
    text-align: center;
    font-size: 24px;
    font-weight: bold;
}

/* Search */
.search-box {
    margin: 40px auto;
    width: 400px;
    position: relative;
}

.search-box input {
    width: 100%;
    padding: 12px;
    border-radius: 8px;
    border: none;
    outline: none;
    font-size: 16px;
}

/* Dropdown */
.dropdown {
    position: absolute;
    width: 100%;
    background: #1e293b;
    border-radius: 8px;
    margin-top: 5px;
    display: none;
    max-height: 200px;
    overflow-y: auto;
}

.dropdown div {
    padding: 10px;
    cursor: pointer;
}

.dropdown div:hover {
    background: #334155;
}

/* Button */
button {
    margin-top: 10px;
    width: 100%;
    padding: 10px;
    border: none;
    border-radius: 8px;
    background: #ef4444;
    color: white;
    font-weight: bold;
    cursor: pointer;
}

/* Grid */
.grid {
    display: flex;
    justify-content: center;
    flex-wrap: wrap;
    gap: 20px;
    padding: 20px;
}

/* Card */
.card {
    width: 180px;
    background: #1e293b;
    border-radius: 12px;
    overflow: hidden;
    transition: 0.3s;
    text-align: center;
}

.card:hover {
    transform: scale(1.08);
    box-shadow: 0 10px 25px rgba(0,0,0,0.6);
}

.card img {
    width: 100%;
    height: 260px;
    object-fit: cover;
}

.card p {
    padding: 10px;
}

/* Error */
.error {
    text-align: center;
    color: #f87171;
}
</style>
</head>

<body>

<header>🎬 Movie Recommender</header>

<div class="search-box">
    <form method="POST">
        <input type="text" name="movie" id="searchInput" placeholder="Search movie..." autocomplete="off">
        <div class="dropdown" id="dropdown"></div>
        <button type="submit">Search</button>
    </form>
</div>

{% if error %}
<p class="error">{{ error }}</p>
{% endif %}

<div class="grid">
    {% if names %}
        {% for i in range(names|length) %}
        <div class="card">
            <img src="{{ posters[i] }}">
            <p>{{ names[i] }}</p>
        </div>
        {% endfor %}
    {% endif %}
</div>

<script>
const input = document.getElementById("searchInput");
const dropdown = document.getElementById("dropdown");

input.addEventListener("input", async () => {
    const query = input.value;

    if (query.length < 2) {
        dropdown.style.display = "none";
        return;
    }

    const res = await fetch(`/search?q=${query}`);
    const data = await res.json();

    dropdown.innerHTML = "";

    data.results.forEach(movie => {
        const div = document.createElement("div");
        div.textContent = movie;

        div.onclick = () => {
            input.value = movie;
            dropdown.style.display = "none";
        };

        dropdown.appendChild(div);
    });

    dropdown.style.display = "block";
});

/* Close dropdown when clicking outside */
document.addEventListener("click", (e) => {
    if (!e.target.closest(".search-box")) {
        dropdown.style.display = "none";
    }
});
</script>

</body>
</html>
